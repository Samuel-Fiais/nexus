services:
  nexus-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Default=Host=firecrawl-nuq-postgres-1;Database=nexus;Username=postgres;Password=postgres
      - LLM_PROVIDER=DeepSeek
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY:-}
      - Slack__SigningSecret=${SLACK_SIGNING_SECRET:-}
      - Slack__BotToken=${SLACK_BOT_TOKEN:-}
      - Knowledge__LocalFolderPath=/app/knowledge
      - Admin__ApiKey=${ADMIN_API_KEY:-}
    volumes:
      - ./knowledge:/app/knowledge:ro
    networks:
      - nexus-network
      - firecrawl_backend

volumes: {}

networks:
  nexus-network:
    driver: bridge
  firecrawl_backend:
    external: true
